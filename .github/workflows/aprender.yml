name: Mi Primer Pipeline

on:
  push:
    branches: [ "main" ]  # Se activa al hacer push a la rama main

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # Corrige "lastest" → "latest"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Trae el código del repositorio

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'  # Usamos Node.js 18

    - name: Install Dependencies
      run: npm install  # Instala las dependencias del package.json

    - name: Run Linter (Opcional)
      run: npm run lint || echo "No hay linter configurado"  # Evita fallo si no hay linter

    - name: Run Tests
      run: npm test  # Ejecuta las pruebas definidas en test/test.js

    - name: Build and Package App
      run: zip -r demo-app.zip .  # Empaqueta toda la aplicación en un ZIP

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: demo-app
        path: demo-app.zip  # Permite descargar el ZIP desde GitHub Actions
